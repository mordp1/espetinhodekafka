# =============================================================================
# MirrorMaker 2 — Active-Active with Transforms (Header-based loop prevention)
# Topology: source ↔ target — both clusters replicate to each other
#
# LOOP PREVENTION STRATEGY:
#   Uses IdentityReplicationPolicy (identical topic names on both sides)
#   + SMT Transforms to:
#     1. FILTER messages that already carry the origin header → drop (prevents loop)
#     2. MARK replicated messages with a provenance header
#
# Flow source → target:
#   - Drop if message already has header "from_cluster_target"  (originated in target)
#   - Insert header "from_cluster_source" before delivering to target
#
# Flow target → source:
#   - Drop if message already has header "from_cluster_source"  (originated in source)
#   - Insert header "from_cluster_target" before delivering to source
# =============================================================================

# ======================================================
# CORE SETTINGS (WORKER)
# ======================================================
clusters = source, target

# Allow MM2 to accept per-flow producer/consumer overrides
connector.client.config.override.policy = All

# Header converter required by the InsertHeader/Filter SMT transforms
header.converter = org.apache.kafka.connect.storage.StringConverter

# IdentityReplicationPolicy: keeps topic names identical on the destination
# Required when loop prevention is handled via headers/transforms instead of prefixes
replication.policy.class = org.apache.kafka.connect.mirror.IdentityReplicationPolicy

# Exclude internal topics — also exclude prefixed ones in case DefaultPolicy is used elsewhere
topics.exclude = .*\.internal,.*-internal,mm2-.*,__.*,source\..*,target\..*,heartbeats

# Replication factor (1 = local lab; 3 = production)
replication.factor = 1

# Fast topic and group discovery (lab setting)
refresh.topics.enabled = true
refresh.topics.interval.seconds = 30
refresh.groups.enabled = true
refresh.groups.interval.seconds = 20

# ======================================================
# LARGE MESSAGE SUPPORT
# ======================================================
producer.max.request.size = 10485760
consumer.max.partition.fetch.bytes = 10485760
consumer.fetch.max.bytes = 20971520
consumer.max.poll.records = 100
producer.buffer.memory = 67108864
offset.flush.timeout.ms = 60000

# ======================================================
# CLUSTER CONNECTION SETTINGS — local Docker lab
# ======================================================
source.bootstrap.servers = localhost:9092
target.bootstrap.servers = localhost:9094

# ======================================================
# FLOW: source → target
# ======================================================
source->target.enabled = true
source->target.topics = .*

# Per-flow overrides for large message support
source->target.producer.override.max.request.size = 10485760
source->target.consumer.override.max.partition.fetch.bytes = 10485760
source->target.producer.compression.type = lz4

# Transforms: drop messages coming from target + stamp messages going to target
source->target.transforms = filterFromTarget, markFromSource

# Filter: drop message if it already carries header "from_cluster_target"
# (it originated in target and was replicated here — do not replicate back)
source->target.transforms.filterFromTarget.type           = org.apache.kafka.connect.transforms.Filter
source->target.transforms.filterFromTarget.predicate      = hasHeaderFromTarget
source->target.transforms.filterFromTarget.negate         = false

source->target.predicates = hasHeaderFromTarget
source->target.predicates.hasHeaderFromTarget.type = org.apache.kafka.connect.transforms.predicates.HasHeaderKey
source->target.predicates.hasHeaderFromTarget.name = from_cluster_target

# Mark: insert header "from_cluster_source=true" on all messages replicated to target
source->target.transforms.markFromSource.type           = org.apache.kafka.connect.transforms.InsertHeader
source->target.transforms.markFromSource.header         = from_cluster_source
source->target.transforms.markFromSource.value.literal  = true

# Skip transforms on MM2 internal connectors (heartbeat/checkpoint metadata)
source->target.MirrorHeartbeatConnector.transforms   = none
source->target.MirrorCheckpointConnector.transforms  = none

# ======================================================
# FLOW: target → source
# ======================================================
target->source.enabled = true
target->source.topics = .*

# Per-flow overrides for large message support
target->source.producer.override.max.request.size = 10485760
target->source.consumer.override.max.partition.fetch.bytes = 10485760
target->source.producer.compression.type = lz4

# Transforms: drop messages coming from source + stamp messages going to source
target->source.transforms = filterFromSource, markFromTarget

# Filter: drop message if it already carries header "from_cluster_source"
# (it originated in source and was replicated here — do not replicate back)
target->source.transforms.filterFromSource.type           = org.apache.kafka.connect.transforms.Filter
target->source.transforms.filterFromSource.predicate      = hasHeaderFromSource
target->source.transforms.filterFromSource.negate         = false

target->source.predicates = hasHeaderFromSource
target->source.predicates.hasHeaderFromSource.type = org.apache.kafka.connect.transforms.predicates.HasHeaderKey
target->source.predicates.hasHeaderFromSource.name = from_cluster_source

# Mark: insert header "from_cluster_target=true" on all messages replicated to source
target->source.transforms.markFromTarget.type           = org.apache.kafka.connect.transforms.InsertHeader
target->source.transforms.markFromTarget.header         = from_cluster_target
target->source.transforms.markFromTarget.value.literal  = true

# Skip transforms on MM2 internal connectors (heartbeat/checkpoint metadata)
target->source.MirrorHeartbeatConnector.transforms   = none
target->source.MirrorCheckpointConnector.transforms  = none

# ======================================================
# MM2 INTERNAL TOPICS AND SYNCHRONIZATION
# ======================================================
checkpoints.topic.replication.factor = 1
heartbeats.topic.replication.factor = 1
offset-syncs.topic.replication.factor = 1
offset.storage.replication.factor = 1
status.storage.replication.factor = 1
config.storage.replication.factor = 1

# Do not sync topic configs — avoids conflicts with auto-create topics
sync.topic.configs.enabled = false
sync.topic.acls.enabled = false

sync.group.offsets.enabled = true
emit.checkpoints.enabled = true
emit.checkpoints.interval.seconds = 20

# ======================================================
# PERFORMANCE
# ======================================================
tasks.max = 4
