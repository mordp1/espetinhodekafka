# =============================================================================
# MirrorMaker 2 — Active-Passive (one-way replication)
# Topology: source → target
# =============================================================================
# Cluster aliases (can be any name)
clusters = source, target

# Bootstrap servers — Docker internal addresses (uncomment if running MM2 inside Docker)
#source.bootstrap.servers = kafka-source:29092
#target.bootstrap.servers = kafka-target:39094

# Bootstrap servers — local addresses (use when running MM2 outside Docker)
source.bootstrap.servers = localhost:9092
target.bootstrap.servers = localhost:9094

# Flow: one-way replication source → target only
source->target.enabled = true
target->source.enabled = false

# Topics to replicate (regex) and exclude
source->target.topics = .*
topics.exclude = __.*,.*\.internal,.*-internal,mm2-.*,heartbeats

# =============================================================================
# Replication Policy
# IdentityReplicationPolicy → keeps topic names identical on the destination
#   Ideal for migrations and when prefixes like "source.topicName" are unwanted
# DefaultReplicationPolicy (default) → prefixes with "source.topicName"
#   Safer for active-active (prevents loops natively via naming)
# =============================================================================
replication.policy.class = org.apache.kafka.connect.mirror.IdentityReplicationPolicy

# Replication factor for replicated topics
replication.factor = 1

# =============================================================================
# Consumer Group Synchronization
# =============================================================================
sync.group.offsets.enabled = true
sync.group.offsets.interval.seconds = 60
emit.checkpoints.enabled = true
emit.checkpoints.interval.seconds = 60

# Sync topic configurations (partitions, retention, etc.) from source to target
sync.topic.configs.enabled = true
# ACLs are generally disabled in local lab environments
sync.topic.acls.enabled = false

# =============================================================================
# MM2 Internal Topics (replication factor = 1 for local lab)
# Use 3 in production
# =============================================================================
checkpoints.topic.replication.factor = 1
heartbeats.topic.replication.factor = 1
offset-syncs.topic.replication.factor = 1
offset.storage.replication.factor = 1
status.storage.replication.factor = 1
config.storage.replication.factor = 1

# =============================================================================
# Topic and Consumer Group Discovery
# -----------------------------------------------------------------------------
# MM2 periodically polls to discover new topics and groups.
# Default: 600 seconds (10 minutes) — this is why newly created topics seem
# to not be replicated immediately. Reduce to 30s for lab; 60-120s for production.
# =============================================================================
refresh.topics.enabled = true
refresh.topics.interval.seconds = 30

refresh.groups.enabled = true
refresh.groups.interval.seconds = 30

# =============================================================================
# Performance
# =============================================================================
tasks.max = 3
