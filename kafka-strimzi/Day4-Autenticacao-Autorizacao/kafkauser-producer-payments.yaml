apiVersion: kafka.strimzi.io/v1
kind: KafkaUser
metadata:
  name: producer-payments
  labels:
    strimzi.io/cluster: my-cluster
spec:
  authentication:
    type: scram-sha-512
  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          name: payments.
          patternType: prefix
        operations:
          - Write
          - Describe
  quotas:
    producerByteRate: 1048576
    requestPercentage: 25
