apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: my-cluster
spec:
  kafka:
    version: 4.3.0
    metadataVersion: 4.3-IV0
    # Sem listener "plain": em produção, todo listener client-facing exige TLS + autenticação.
    listeners:
      - name: tls
        port: 9093
        type: internal
        tls: true
        authentication:
          type: tls
      - name: scram
        port: 9094
        type: internal
        tls: true
        authentication:
          type: scram-sha-512
    # type: simple resolve, em cluster KRaft, para o StandardAuthorizer nativo do Kafka
    # (org.apache.kafka.metadata.authorizer.StandardAuthorizer) — sem Zookeeper, sem AclAuthorizer legado.
    authorization:
      type: simple
      superUsers:
        - CN=admin
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
  entityOperator:
    topicOperator: {}
    userOperator: {}
